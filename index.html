<!-- 🔳 QR SECTION -->
<button onclick="generateQR()">Show My QR</button>
<button onclick="downloadQR()">Download QR</button>

<div id="qr"></div>

<script>
  // 👇 THIS is your website link
  let websiteLink = "https://sarita-14.github.io/";

  let qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" 
              + encodeURIComponent(websiteLink);

  function generateQR() {
    document.getElementById("qr").innerHTML =
      `<img src="${qrUrl}" id="qrImage">`;
  }

  function downloadQR() {
    let link = document.createElement('a');
    link.href = qrUrl;
    link.download = "SaritaProfileQR.png";
    link.click();
  }
</script>
