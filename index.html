<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  color: white;
}

/* FULL BACKGROUND IMAGE */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.6);
}

/* CARD */
.card {

  text-align: center;
}

img.profile {
  width: 160px;
  border-radius: 15px;
  margin-bottom: 10px;
}

/* BUTTONS */
button {
  margin: 8px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: black;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #0ea5e9;
}

/* SOCIAL LINKS */
.socials a {
  display: block;
  margin: 6px;
  padding: 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  text-decoration: none;
  color: #38bdf8;
}

.socials a:hover {

}

/* QR */
#qr img {
  margin-top: 15px;
  border-radius: 10px;

  let a = document.createElement("a");
