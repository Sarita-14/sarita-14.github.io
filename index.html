<!DOCTYPE html>
<html>
<head>
<title>Scan My QR</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
    font-family: Arial;
    text-align: center;
}

.box {
    background: rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

#qrcode {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="box">
    <h2>📲 Scan this to view my profile</h2>
    <div id="qrcode"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
new QRCode(document.getElementById("qrcode"), {
    text: "https://sarita-14.github.io/profile.html",
    width: 200,
    height: 200
});
</script>

</body>
</html>
