<!DOCTYPE html>
<html>
<head>
<title>Scan QR - Prakash Kori</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    background: linear-gradient(135deg, #1e3a8a, #0f172a);

    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🔥 BIG CONTAINER */
.container {
    width: 96%;
    max-width: 550px;   /* bigger */
    padding: 45px;

    text-align: center;
    border-radius: 25px;

    background: rgba(15, 23, 42, 0.9);
    color: #e2e8f0;

    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

/* TITLE */
h1 {
    font-size: 26px;
    margin-bottom: 25px;
}

/* 🔥 HUGE QR */
.qr-img {
    width: 350px;   /* 🔥 VERY BIG */
    max-width: 100%;
    border-radius: 15px;
    margin: 25px 0;
    transition: 0.3s;
}

/* CLICK EFFECT */
.qr-img:hover {
    transform: scale(1.05);
}

/* TEXT */
p {
    font-size: 17px;
    opacity: 0.9;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 15px;
    width: 100%;
    border: none;
    border-radius: 12px;

    background: #38bdf8;
    color: #0f172a;
    font-size: 17px;
    font-weight: bold;

    cursor: pointer;
}

.btn:hover {
    background: #0ea5e9;
}
</style>

</head>

<body>

<div class="container">

    <h1>📲 Scan OR Tap QR to View Profile</h1>

    <!-- 🔥 CLICKABLE QR -->
    <a href="profile.html">
        <img src="qr.png" class="qr-img">
    </a>

    <p>Tap or scan to open Prakash's profile</p>

    <!-- DOWNLOAD -->
    <a href="qr.png" download>
        <button class="btn">⬇ Download QR</button>
    </a>

</div>

</body>
</html>
