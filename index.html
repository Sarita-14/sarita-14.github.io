<!DOCTYPE html>
<html>
<head>
<title>Scan QR - Prakash Kori</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    /* 🔥 NICE BACKGROUND */
    background: linear-gradient(135deg, #1e3a8a, #0f172a);

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🔥 BIG CONTAINER */
.container {
    width: 95%;
    max-width: 500px;   /* bigger */
    padding: 40px;

    text-align: center;
    border-radius: 25px;

    background: rgba(15, 23, 42, 0.85);
    color: #e2e8f0;

    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* TITLE */
h1 {
    font-size: 24px;
    margin-bottom: 20px;
}

/* 🔥 BIG QR */
.qr-img {
    width: 280px;   /* BIG */
    max-width: 100%;
    border-radius: 15px;
    margin: 20px 0;
}

/* TEXT */
p {
    font-size: 16px;
    opacity: 0.9;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 14px;
    width: 100%;
    border: none;
    border-radius: 12px;

    background: #38bdf8;
    color: #0f172a;
    font-size: 16px;
    font-weight: bold;

    cursor: pointer;
}

.btn:hover {
    background: #0ea5e9;
}
</style>

</head>

<body>

<div class="container">

    <h1>📲 Scan this QR to view Prakash's Profile</h1>

    <!-- 🔥 YOUR QR IMAGE -->
    <img src="qr.png" class="qr-img">

    <p>Scan using any QR scanner to open profile</p>

    <!-- DOWNLOAD BUTTON -->
    <a href="qr.png" download>
        <button class="btn">⬇ Download QR</button>
    </a>

</div>

</body>
</html>
