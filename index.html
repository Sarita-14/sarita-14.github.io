<!DOCTYPE html>
<html>
<head>
<title>Scan My QR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;

    /* AESTHETIC BACKGROUND */
    background: linear-gradient(135deg, #89f7fe, #66a6ff);
}

/* BOX */
.box {
    text-align: center;
    background: rgba(255,255,255,0.25);
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* TEXT */
h2 {
    margin-bottom: 10px;
    font-weight: 600;
}

p {
    color: #333;
    font-size: 14px;
}

/* QR */
#qrcode {
    margin-top: 20px;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #333;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

.btn:hover {
    background: #000;
}
</style>

</head>

<body>

<div class="box">

    <h2>📲 Scan this QR</h2>
    <p>Scan this QR to view Prakash's Profile</p>

    <div id="qrcode"></div>

    <button class="btn" onclick="downloadQR()">Download QR</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
let qr = new QRCode(document.getElementById("qrcode"), {
    text: "https://sarita-14.github.io/profile.html",
    width: 200,
    height: 200
});

function downloadQR() {
    let img = document.querySelector("#qrcode img");
    let link = document.createElement("a");
    link.href = img.src;
    link.download = "PrakashQR.png";
    link.click();
}
</script>

</body>
</html>
