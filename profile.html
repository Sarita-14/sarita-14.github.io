<!DOCTYPE html>
<html>
<head>
<title>Prakash Kori</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    background: linear-gradient(135deg, #89f7fe, #66a6ff);

    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BIGGER CARD */
.card {
    width: 90%;              /* 🔥 responsive */
    max-width: 400px;       /* 🔥 bigger than before */
    padding: 30px;          /* 🔥 more space */
    border-radius: 25px;
    text-align: center;
    color: white;

    /* GLASS EFFECT (NOT WHITE) */
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

/* PROFILE IMAGE */
.profile-img {
    width: 130px;           /* 🔥 slightly bigger */
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.7);
}

/* TEXT */
h2 {
    margin: 12px 0;
}

p {
    margin: 6px 0;
    font-size: 15px;
}

/* SOCIAL TITLE */
.social-title {
    margin-top: 18px;
    font-weight: bold;
    font-size: 17px;
}

/* SOCIAL BUTTONS */
.social a {
    display: block;
    margin: 10px 0;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.insta {
    background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.whatsapp {
    background: #25D366;
}

.social a:hover {
    transform: scale(1.05);
}

/* BUTTON */
.btn {
    margin-top: 12px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    cursor: pointer;
    font-weight: bold;
}

.btn:hover {
    background: black;
}
</style>

</head>

<body>

<div class="card">

    <img src="profile.jpg" class="profile-img">

    <h2>Prakash Kori</h2>

    <p>📞 7057892039</p>
    <p>📧 prakashk198721@gmail.com</p>
    <p>📍 Ambernath, Thane, Maharashtra</p>
    <p>🩸 Blood Group: A+ve</p>

    <p>🪪 Aadhaar: 2907 9049 7***</p>

    <div class="social-title">Social</div>

    <div class="social">
        <a class="insta" href="https://www.instagram.com/prakashkori87?igsh=MXhpdTBzMTlydmNxNg==" target="_blank">
            Instagram
        </a>

        <a class="whatsapp" href="https://wa.me/917057892039" target="_blank">
            WhatsApp
        </a>
    </div>

    <button class="btn" onclick="saveContact()">Save Contact</button>

</div>

<script>
function saveContact() {
    let vCard = "BEGIN:VCARD\n" +
                "VERSION:3.0\n" +
                "FN:Prakash Kori\n" +
                "TEL;TYPE=CELL:7057892039\n" +
                "EMAIL:prakashk198721@gmail.com\n" +
                "ADR:Ambernath, Thane, Maharashtra\n" +
                "END:VCARD";

    let blob = new Blob([vCard], { type: "text/vcard;charset=utf-8" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "contact.vcf";
    link.click();
}
</script>

</body>
</html>
