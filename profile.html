<style>
body {
    margin: 0;
    font-family: 'Segoe UI';

    /* AESTHETIC PREMIUM BACKGROUND */
    background: radial-gradient(circle at top left, #2b5876, transparent 40%),
                radial-gradient(circle at bottom right, #4e4376, transparent 40%),
                linear-gradient(135deg, #0f2027, #203a43, #2c5364);

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    width: 340px;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    color: white;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* IMAGE */
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.6);
}

/* TEXT */
h2 {
    margin: 10px 0;
}

p {
    margin: 6px 0;
    font-size: 14px;
}

/* SOCIAL TITLE */
.social-title {
    margin-top: 15px;
    font-weight: bold;
    font-size: 16px;
}

/* SOCIAL BUTTONS */
.social a {
    display: block;
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.insta {
    background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.whatsapp {
    background: #25D366;
}

.social a:hover {
    transform: scale(1.05);
}

/* BUTTON */
.btn {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #ffffff;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

.btn:hover {
    background: #ddd;
}
</style>
