<!DOCTYPE html>
<html>
<head>
<title>Prakash Kori</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* BACKGROUND IMAGE + OVERLAY */
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
                url("profile.jpg") center/cover no-repeat;
}

/* CARD */
.card {
    width: 340px;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    color: white;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
}

/* PROFILE IMAGE */
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #00c6ff;
}

/* TEXT */
h2 {
    margin: 10px 0;
}

p {
    margin: 6px 0;
    font-size: 14px;
}

/* SOCIAL */
.social-title {
    margin-top: 15px;
    font-weight: bold;
}

.social a {
    display: block;
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

/* INSTAGRAM */
.insta {
    background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

/* WHATSAPP */
.whatsapp {
    background: #25D366;
}

/* BUTTON */
.btn {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #00c6ff;
    cursor: pointer;
}

/* QR */
#qrcode {

}
</style>

</head>

<body>

<script>

/* DOWNLOAD QR */
function downloadQR() {

    let link = document.createElement("a");

    link.download = "MyQR.png";

}

                "VERSION:3.0\n" +

                "TEL;TYPE=CELL:7057892039\n" +
                "EMAIL:prakashk198721@gmail.com\n" +
                "ADR:Ambernath, Thane, Maharashtra\n" +
                "END:VCARD";

    let blob = new Blob([vCard], { type: "text/vcard;charset=utf-8" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "contact.vcf";
    link.click();
}
</script>
