<!DOCTYPE html>

<head>
<title>Prakash Kori</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    background: linear-gradient(135deg, #667eea, #764ba2);

    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FLOAT ANIMATION */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* CARD */
.card {
    width: 90%;
    max-width: 420px;
    padding: 32px;
    border-radius: 25px;
    text-align: center;
    color: white;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);

    box-shadow: 0 15px 40px rgba(0,0,0,0.3);

    animation: float 4s ease-in-out infinite;
}

/* IMAGE */
.profile-img {
    width: 135px;
    height: 135px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.8);
    margin-bottom: 10px;
}

/* TEXT */
h2 {
    margin: 10px 0;
    font-weight: 600;
}

p {
    margin: 6px 0;
    font-size: 15px;
    opacity: 0.95;
}

/* CLICKABLE LINKS */
a.info-link {
    color: white;
    text-decoration: none;
}

/* SOCIAL TITLE */
.social-title {
    margin-top: 20px;
    font-size: 18px;
    font-weight: 600;
}

/* SOCIAL BUTTONS */
.social a {
    display: block;
    margin: 10px 0;
    padding: 13px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

/* SHINE EFFECT */
.social a::before {
    content: "";
    position: absolute;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.3);
    top: 0;
    left: -100%;
    transform: skewX(-25deg);
}

.social a:hover::before {
    left: 150%;
    transition: 0.5s;
}

.insta {
    background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.whatsapp {
    background: #25D366;
}

.social a:hover {
    transform: scale(1.07);
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: rgba(0,0,0,0.7);
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: black;
    transform: scale(1.05);
}
</style>

</head>

<body>
