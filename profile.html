<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    /* 🔥 AESTHETIC BACKGROUND (SOFT + PREMIUM) */
    background: linear-gradient(135deg, #dbeafe, #f0f9ff);

    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FLOAT */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* CARD */
.card {
    width: 92%;              /* 🔥 more width */
    max-width: 460px;        /* 🔥 bigger */
    padding: 35px;

    border-radius: 25px;
    text-align: center;

    /* 🔥 LIGHT GLASS (NO WHITE HARSH) */
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(20px);

    color: #1e293b; /* 🔥 DARK TEXT (VISIBLE) */

    box-shadow: 0 15px 35px rgba(0,0,0,0.15);

    animation: float 3s ease-in-out infinite;
}

/* IMAGE */
.profile-img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #2563eb;
}

/* TEXT */
h2 {
    margin: 12px 0;
    font-weight: 600;
}

p {
    margin: 7px 0;
    font-size: 15px;
}

/* LINKS */
a.info-link {
    color: #2563eb;
    text-decoration: none;
    font-weight: 500;
}

/* SOCIAL TITLE */
.social-title {
    margin-top: 20px;
    font-size: 18px;
    font-weight: 600;
}

/* SOCIAL BUTTONS */
.social a {
    display: block;
    margin: 10px 0;
    padding: 13px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

/* COLORS */
.insta {
    background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.whatsapp {
    background: #25D366;
}

.social a:hover {
    transform: scale(1.08);
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

.btn:hover {
    background: #1d4ed8;
}
</style>

</head>

<body>
