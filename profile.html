<!DOCTYPE html>
<html>
<head>
<title>Prakash Kori</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';

    /* AESTHETIC BACKGROUND */
    background: linear-gradient(135deg, #1f1c2c, #928dab);

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    width: 340px;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    color: white;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);

    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* IMAGE */
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ffffff;
}

/* TEXT */
h2 {
    margin: 10px 0;
}

p {
    margin: 6px 0;
    font-size: 14px;
}

/* SOCIAL TITLE */
.social-title {
    margin-top: 15px;
    font-weight: bold;
    font-size: 16px;
}

/* SOCIAL BUTTONS */
.social a {
    display: block;
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.insta {
    background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.whatsapp {
    background: #25D366;
}

.social a:hover {
    transform: scale(1.05);
}

/* BUTTON */
.btn {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #ffffff;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

.btn:hover {
    background: #ddd;
}
</style>

</head>

<body>

<div class="card">

    <img src="profile.jpg" class="profile-img">

    <h2>Prakash Kori</h2>

    <p>📞 7057892039</p>
    <p>📧 prakashk198721@gmail.com</p>
    <p>📍 Ambernath, Thane, Maharashtra</p>
    <p>🩸 Blood Group: A+ve</p>

    <!-- MASKED AADHAAR -->
    <p>🪪 Aadhaar: **** **** ****</p>

    <div class="social-title">Social</div>

    <div class="social">
        <a class="insta" href="https://www.instagram.com/prakashkori87?igsh=MXhpdTBzMTlydmNxNg==" target="_blank">
            Instagram
        </a>

        <a class="whatsapp" href="https://wa.me/917057892039" target="_blank">
            WhatsApp
        </a>
    </div>

    <button class="btn" onclick="saveContact()">Save Contact</button>

</div>

<script>
function saveContact() {
    let vCard = "BEGIN:VCARD\n" +
                "VERSION:3.0\n" +
                "FN:Prakash Kori\n" +
                "TEL;TYPE=CELL:7057892039\n" +
                "EMAIL:prakashk198721@gmail.com\n" +
                "ADR:Ambernath, Thane, Maharashtra\n" +
                "END:VCARD";

    let blob = new Blob([vCard], { type: "text/vcard;charset=utf-8" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "contact.vcf";
    link.click();
}
</script>

</body>
</html>
