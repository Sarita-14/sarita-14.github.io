<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    background: linear-gradient(135deg, #1e3a8a, #0f172a);

    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FLOAT */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-22px); }
    100% { transform: translateY(0px); }
}

/* 🔥 ULTRA BIG CARD */
.card {
    width: 96%;             /* almost full screen */
    max-width: 600px;       /* MUCH bigger */
    padding: 55px;          /* more breathing space */

    border-radius: 30px;
    text-align: center;

    background: rgba(15, 23, 42, 0.85);

    color: #e2e8f0;

    box-shadow: 0 25px 60px rgba(0,0,0,0.6);

    animation: float 3s ease-in-out infinite;
}

/* IMAGE */
.profile-img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #38bdf8;
}

/* TEXT */
h2 {
    margin: 18px 0;
    font-size: 30px;   /* bigger */
}

p {
    margin: 10px 0;
    font-size: 17px;   /* bigger */
}

/* LINKS */
a.info-link {
    color: #38bdf8;
    text-decoration: none;
    font-weight: 500;
}

/* SOCIAL TITLE */
.social-title {
    margin-top: 28px;
    font-size: 22px;
    font-weight: 600;
}

/* SOCIAL BUTTONS */
.social a {
    display: block;
    margin: 14px 0;
    padding: 16px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    font-size: 17px;
    transition: 0.3s;
}

.insta {
    background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.whatsapp {
    background: #25D366;
}

.social a:hover {
    transform: scale(1.1);
}

/* BUTTON */
.btn {
    margin-top: 22px;
    padding: 16px;
    border: none;
    border-radius: 15px;
    background: #38bdf8;
    color: #0f172a;
    cursor: pointer;
    font-weight: bold;
    font-size: 17px;
}

.btn:hover {
    background: #0ea5e9;
}
</style>
